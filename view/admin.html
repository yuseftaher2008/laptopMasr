<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | TechMasr</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.fill-icon { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
body { overflow-x:hidden; }
.shell { display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
.sidebar { width:240px; background:rgba(19,27,46,0.9); backdrop-filter:blur(20px); border-right:1px solid var(--glass-border); display:flex; flex-direction:column; padding:24px 16px; flex-shrink:0; position:fixed; left:0; top:0; height:100vh; z-index:50; }
.sidebar-logo { font-family:'Hanken Grotesk',sans-serif; font-size:20px; font-weight:800; margin-bottom:8px; }
.sidebar-logo span { color:#b4c5ff; }
.sidebar-role { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--outline); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:32px; }
.nav-section { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--outline-variant); text-transform:uppercase; letter-spacing:0.15em; margin:16px 0 8px 12px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--on-surface-variant); cursor:pointer; transition:all 0.2s; text-transform:uppercase; letter-spacing:0.05em; border:none; background:none; width:100%; text-align:left; }
.nav-item:hover { background:rgba(255,255,255,0.05); color:var(--on-surface); }
.nav-item.active { background:rgba(37,99,235,0.15); color:var(--primary); }
.nav-item .material-symbols-outlined { font-size:18px; }
.sidebar-footer { margin-top:auto; }
.sidebar-btn { width:100%; padding:11px; background:linear-gradient(135deg,#2563eb,#8343f4); border:none; border-radius:8px; color:var(--on-primary-container); font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.3s; }
.sidebar-btn:hover { box-shadow:0 0 20px rgba(37,99,235,0.4); }

/* Main */
.main { flex:1; margin-left:240px; overflow-y:auto; background:var(--surface); }
.topbar { position:sticky; top:0; z-index:40; background:rgba(11,19,38,0.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; }
.topbar-title { font-family:'Hanken Grotesk',sans-serif; font-size:20px; font-weight:700; }
.topbar-sub { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--outline); margin-top:2px; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.search-bar { display:flex; align-items:center; gap:8px; background:rgba(23,31,51,0.8); border:1px solid var(--glass-border); border-radius:8px; padding:8px 14px; }
.search-bar input { background:none; border:none; outline:none; color:var(--on-surface); font-size:13px; width:160px; }
.search-bar input::placeholder { color:var(--outline); }

/* Content */
.content { padding:32px; }

/* Stat cards */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
.stat-card { padding:20px; }
.stat-icon-wrap { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
.stat-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--on-surface-variant); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
.stat-val { font-family:'Hanken Grotesk',sans-serif; font-size:28px; font-weight:800; letter-spacing:-0.5px; }
.stat-change { font-family:'JetBrains Mono',monospace; font-size:10px; margin-top:4px; }
.stat-change.up { color:#34D399; }
.stat-change.neutral { color:var(--outline); }

/* Table */
.table-section { margin-bottom:32px; }
.table-header { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid var(--glass-border); }
.table-title { font-family:'Hanken Grotesk',sans-serif; font-size:16px; font-weight:700; }
table { width:100%; border-collapse:collapse; }
th { padding:12px 24px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--on-surface-variant); text-align:left; text-transform:uppercase; letter-spacing:0.08em; background:rgba(34,42,61,0.5); border-bottom:1px solid var(--glass-border); }
td { padding:14px 24px; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
tr:hover td { background:rgba(255,255,255,0.02); }
tr:last-child td { border-bottom:none; }
.product-name-cell { display:flex; align-items:center; gap:12px; }
.product-thumb { width:40px; height:40px; background:rgba(23,31,51,0.8); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.action-btn-sm { padding:6px 12px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; border:none; transition:all 0.2s; }
.btn-edit { background:rgba(180,197,255,0.1); color:var(--primary); border:1px solid rgba(180,197,255,0.2); }
.btn-edit:hover { background:rgba(180,197,255,0.2); }
.btn-delete { background:rgba(147,0,10,0.15); color:var(--error); border:1px solid rgba(255,180,171,0.2); margin-left:6px; }
.btn-delete:hover { background:rgba(147,0,10,0.3); }
.status-select { background:rgba(23,31,51,0.8); border:1px solid var(--glass-border); border-radius:6px; padding:5px 10px; color:var(--on-surface); font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; outline:none; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(2,6,23,0.8); backdrop-filter:blur(8px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s ease; }
.modal { background:var(--surface-container); border:1px solid var(--glass-border); border-radius:16px; padding:32px; width:100%; max-width:500px; animation:fadeInUp 0.3s ease; }
.modal-title { font-family:'Hanken Grotesk',sans-serif; font-size:20px; font-weight:700; margin-bottom:24px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-field { margin-bottom:0; }
.modal-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--on-surface-variant); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:6px; }
.modal-actions { display:flex; gap:12px; margin-top:24px; justify-content:flex-end; }
.loading { text-align:center; padding:60px; color:var(--outline); font-family:'JetBrains Mono',monospace; }
.spinner { width:28px; height:28px; border:2px solid var(--glass-border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<script src="utils.js"></script>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">Tech<span>Masr</span></div>
    <div class="sidebar-role">Admin Console</div>
    <div class="nav-section">Main</div>
    <button class="nav-item active" onclick="showSection('dashboard')">
      <span class="material-symbols-outlined fill-icon">dashboard</span> Dashboard
    </button>
    <button class="nav-item" onclick="showSection('products')">
      <span class="material-symbols-outlined">laptop_mac</span> Products
    </button>
    <button class="nav-item" onclick="showSection('orders')">
      <span class="material-symbols-outlined">shopping_bag</span> Orders
    </button>
    <div class="nav-section">Account</div>
    <button class="nav-item" onclick="window.location.href='index.html'">
      <span class="material-symbols-outlined">storefront</span> View Store
    </button>
    <button class="nav-item" onclick="auth.logout()">
      <span class="material-symbols-outlined">logout</span> Logout
    </button>
    <div class="sidebar-footer">
      <button class="sidebar-btn" onclick="openAddProduct()">
        <span class="material-symbols-outlined">add</span> Add Product
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Overview</div>
        <div class="topbar-sub">Welcome back, admin.</div>
      </div>
      <div class="topbar-right">
        <div class="search-bar">
          <span class="material-symbols-outlined" style="font-size:18px;color:var(--outline)">search</span>
          <input placeholder="Search..." id="search-input" oninput="handleSearch()"/>
        </div>
        <button class="btn-ghost" style="padding:8px 12px;display:flex;align-items:center;gap:6px" onclick="window.location.href='index.html'">
          <span class="material-symbols-outlined" style="font-size:16px">storefront</span>
        </button>
      </div>
    </div>

    <div class="content">
      <!-- Dashboard section -->
      <div id="section-dashboard">
        <div class="stats-grid" id="stats-grid">
          <div class="glass-card stat-card animate-fade-up">
            <div class="stat-icon-wrap" style="background:rgba(37,99,235,0.15)"><span class="material-symbols-outlined" style="color:#60A5FA;font-size:20px">payments</span></div>
            <div class="stat-label">Products</div>
            <div class="stat-val" id="stat-products">—</div>
            <div class="stat-change neutral">Total listings</div>
          </div>
          <div class="glass-card stat-card animate-fade-up delay-1">
            <div class="stat-icon-wrap" style="background:rgba(139,92,246,0.15)"><span class="material-symbols-outlined" style="color:#A78BFA;font-size:20px">inventory_2</span></div>
            <div class="stat-label">Orders</div>
            <div class="stat-val" id="stat-orders">—</div>
            <div class="stat-change up">↑ Active</div>
          </div>
          <div class="glass-card stat-card animate-fade-up delay-2">
            <div class="stat-icon-wrap" style="background:rgba(194,237,48,0.15)"><span class="material-symbols-outlined" style="color:#c2ed30;font-size:20px">monitor_heart</span></div>
            <div class="stat-label">Status</div>
            <div class="stat-val" style="font-size:18px;color:#34D399">Online</div>
            <div class="stat-change up">API connected</div>
          </div>
          <div class="glass-card stat-card animate-fade-up delay-3">
            <div class="stat-icon-wrap" style="background:rgba(209,187,255,0.15)"><span class="material-symbols-outlined" style="color:#d2bbff;font-size:20px">person</span></div>
            <div class="stat-label">Your Role</div>
            <div class="stat-val" style="font-size:18px">Admin</div>
            <div class="stat-change neutral">Full access</div>
          </div>
        </div>

        <div class="glass-card table-section animate-fade-up delay-2">
          <div class="table-header">
            <div class="table-title">Recent Orders</div>
            <button class="btn-ghost" style="padding:7px 14px;font-size:12px" onclick="showSection('orders')">View All</button>
          </div>
          <div id="dashboard-orders"><div class="loading"><div class="spinner"></div>Loading...</div></div>
        </div>
      </div>

      <!-- Products section -->
      <div id="section-products" style="display:none">
        <div class="glass-card table-section animate-fade-up">
          <div class="table-header">
            <div class="table-title">All Products</div>
            <button class="btn-primary" style="padding:8px 16px;font-size:11px" onclick="openAddProduct()">
              <span class="material-symbols-outlined" style="font-size:16px">add</span> Add Product
            </button>
          </div>
          <div id="products-table"><div class="loading"><div class="spinner"></div>Loading...</div></div>
        </div>
      </div>

      <!-- Orders section -->
      <div id="section-orders" style="display:none">
        <div class="glass-card table-section animate-fade-up">
          <div class="table-header">
            <div class="table-title">All Orders</div>
          </div>
          <div id="orders-table"><div class="loading"><div class="spinner"></div>Loading...</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div id="product-modal" style="display:none">
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" id="modal-title">Add Product</div>
      <form id="product-form">
        <div class="modal-grid">
          <div class="modal-field" style="grid-column:1/-1">
            <label class="modal-label">Product Name *</label>
            <input class="input-field" id="f-name" placeholder="Dell XPS 15" required/>
          </div>
          <div class="modal-field">
            <label class="modal-label">Brand *</label>
            <input class="input-field" id="f-brand" placeholder="Dell" required/>
          </div>
          <div class="modal-field">
            <label class="modal-label">Price (EGP) *</label>
            <input class="input-field" type="number" id="f-price" placeholder="45000" required/>
          </div>
          <div class="modal-field">
            <label class="modal-label">CPU</label>
            <input class="input-field" id="f-cpu" placeholder="Intel i7-13700H"/>
          </div>
          <div class="modal-field">
            <label class="modal-label">RAM (GB)</label>
            <input class="input-field" type="number" id="f-ram" placeholder="16"/>
          </div>
          <div class="modal-field">
            <label class="modal-label">Storage (GB)</label>
            <input class="input-field" type="number" id="f-storage" placeholder="512"/>
          </div>
          <div class="modal-field">
            <label class="modal-label">GPU</label>
            <input class="input-field" id="f-gpu" placeholder="RTX 4060"/>
          </div>
          <div class="modal-field">
            <label class="modal-label">Screen Size</label>
            <input class="input-field" type="number" id="f-screen" placeholder="15.6"/>
          </div>
          <div class="modal-field">
            <label class="modal-label">Stock</label>
            <input class="input-field" type="number" id="f-stock" placeholder="10"/>
          </div>
          <div class="modal-field">
            <label class="modal-label">Tags</label>
            <input class="input-field" id="f-tags" placeholder="gaming, ultrabook"/>
          </div>
          <div class="modal-field" style="grid-column:1/-1">
            <label class="modal-label">Image URL</label>
            <input class="input-field" id="f-image" placeholder="https://..."/>
          </div>
          <div class="modal-field" style="grid-column:1/-1">
            <label class="modal-label">Description</label>
            <textarea class="input-field" id="f-desc" rows="2" placeholder="Product description..."></textarea>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" onclick="document.getElementById('product-modal').style.display='none'">Cancel</button>
          <button type="submit" class="btn-primary" id="modal-submit">
            <span class="material-symbols-outlined" style="font-size:16px">save</span>
            <span id="modal-submit-text">Save Product</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script>
  if (!auth.isLoggedIn() || !auth.isAdmin()) window.location.href = 'login.html';

  let editingId = null;
  let allOrders = [];
  let allProducts = [];

  function showSection(name) {
    ['dashboard','products','orders'].forEach(s => {
      document.getElementById(`section-${s}`).style.display = s === name ? 'block' : 'none';
    });
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event && event.currentTarget && event.currentTarget.classList.add('active');
    document.getElementById('topbar-title').textContent = name.charAt(0).toUpperCase() + name.slice(1);
    if (name === 'products') loadProducts();
    if (name === 'orders') loadOrders();
  }

  // Dashboard
  async function loadDashboard() {
    const [products, orders] = await Promise.all([
      api.get('/products'),
      api.get('/order')
    ]);
    allProducts = Array.isArray(products) ? products : [];
    allOrders = Array.isArray(orders) ? orders : [];
    document.getElementById('stat-products').textContent = allProducts.length;
    document.getElementById('stat-orders').textContent = allOrders.length;
    renderDashboardOrders(allOrders.slice(0,5));
  }

  function statusBadge(status) {
    const map = { pending:'badge-pending', confirmed:'badge-confirmed', shipped:'badge-shipped', delivered:'badge-delivered' };
    return `<span class="badge ${map[status]||'badge-pending'}">${status}</span>`;
  }

  function renderDashboardOrders(orders) {
    const el = document.getElementById('dashboard-orders');
    if (!orders.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--outline);font-family:JetBrains Mono,monospace;font-size:12px">No orders yet</div>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Order ID</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>${orders.map(o => `
        <tr>
          <td><span style="font-family:'JetBrains Mono',monospace;color:var(--primary)">#TM-${String(o.id).padStart(4,'0')}</span></td>
          <td><strong>EGP ${Number(o.total).toLocaleString()}</strong></td>
          <td>${statusBadge(o.status)}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--outline)">${new Date(o.created_at).toLocaleDateString()}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // Products
  async function loadProducts() {
    const el = document.getElementById('products-table');
    el.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
    const data = await api.get('/products');
    allProducts = Array.isArray(data) ? data : [];
    renderProductsTable(allProducts);
  }

  function renderProductsTable(products) {
    const el = document.getElementById('products-table');
    if (!products.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--outline)">No products found</div>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Product</th><th>Brand</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead>
      <tbody>${products.map(p => `
        <tr>
          <td><div class="product-name-cell">
            <div class="product-thumb"><span class="material-symbols-outlined" style="font-size:20px;color:var(--outline)">laptop_mac</span></div>
            <span>${p.name}</span>
          </div></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--secondary)">${p.brand}</td>
          <td><strong>EGP ${Number(p.price).toLocaleString()}</strong></td>
          <td>${p.stock > 0 ? `<span class="badge badge-delivered">${p.stock}</span>` : `<span class="badge" style="background:rgba(147,0,10,0.2);color:var(--error)">0</span>`}</td>
          <td>
            <button class="action-btn-sm btn-edit" onclick="openEditProduct(${p.id})">Edit</button>
            <button class="action-btn-sm btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  // Orders
  async function loadOrders() {
    const el = document.getElementById('orders-table');
    el.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
    const data = await api.get('/order');
    allOrders = Array.isArray(data) ? data : [];
    renderOrdersTable(allOrders);
  }

  function renderOrdersTable(orders) {
    const el = document.getElementById('orders-table');
    if (!orders.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--outline)">No orders found</div>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Order ID</th><th>Total</th><th>Status</th><th>Date</th><th>Update</th></tr></thead>
      <tbody>${orders.map(o => `
        <tr>
          <td><span style="font-family:'JetBrains Mono',monospace;color:var(--primary)">#TM-${String(o.id).padStart(4,'0')}</span></td>
          <td><strong>EGP ${Number(o.total).toLocaleString()}</strong></td>
          <td id="status-badge-${o.id}">${statusBadge(o.status)}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--outline)">${new Date(o.created_at).toLocaleDateString()}</td>
          <td>
            <select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)">
              <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
              <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
              <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
              <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  async function updateOrderStatus(id, status) {
    const result = await api.put(`/order/${id}`, { status });
    if (result.ok) {
      toast.show(`Order #${id} updated to ${status}`);
      document.getElementById(`status-badge-${id}`).innerHTML = statusBadge(status);
    } else {
      toast.show('Failed to update status', 'error');
    }
  }

  // Product modal
  function openAddProduct() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('modal-submit-text').textContent = 'Save Product';
    document.getElementById('product-form').reset();
    document.getElementById('product-modal').style.display = 'flex';
    showSection('products');
  }

  function openEditProduct(id) {
    const p = allProducts.find(p => p.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('modal-submit-text').textContent = 'Update Product';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-brand').value = p.brand || '';
    document.getElementById('f-price').value = p.price || '';
    document.getElementById('f-cpu').value = p.cpu || '';
    document.getElementById('f-ram').value = p.ram || '';
    document.getElementById('f-storage').value = p.storage || '';
    document.getElementById('f-gpu').value = p.gpu || '';
    document.getElementById('f-screen').value = p.screen_size || '';
    document.getElementById('f-stock').value = p.stock || '';
    document.getElementById('f-tags').value = p.tags || '';
    document.getElementById('f-image').value = p.image_url || '';
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('product-modal').style.display = 'flex';
  }

  function closeModal(e) {
    if (e.target === e.currentTarget) document.getElementById('product-modal').style.display = 'none';
  }

  document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('modal-submit');
    btn.disabled = true;
    const body = {
      name: document.getElementById('f-name').value,
      brand: document.getElementById('f-brand').value,
      price: Number(document.getElementById('f-price').value),
      cpu: document.getElementById('f-cpu').value,
      ram: Number(document.getElementById('f-ram').value) || null,
      storage: Number(document.getElementById('f-storage').value) || null,
      gpu: document.getElementById('f-gpu').value,
      screen_size: Number(document.getElementById('f-screen').value) || null,
      stock: Number(document.getElementById('f-stock').value) || 0,
      tags: document.getElementById('f-tags').value,
      image_url: document.getElementById('f-image').value,
      description: document.getElementById('f-desc').value,
    };
    const result = editingId
      ? await api.put(`/products/${editingId}`, body)
      : await api.post('/products', body);
    btn.disabled = false;
    if (result.ok) {
      toast.show(editingId ? 'Product updated!' : 'Product added!');
      document.getElementById('product-modal').style.display = 'none';
      loadProducts();
      loadDashboard();
    } else {
      const errors = result.data.errors;
      toast.show(errors ? errors[0].msg : (result.data.message || 'Failed'), 'error');
    }
  });

  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    const result = await api.delete(`/products/${id}`);
    if (result.ok) { toast.show('Product deleted'); loadProducts(); loadDashboard(); }
    else toast.show('Failed to delete', 'error');
  }

  function handleSearch() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const section = document.getElementById('section-products').style.display !== 'none' ? 'products' : 'orders';
    if (section === 'products') {
      renderProductsTable(allProducts.filter(p => p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q)));
    }
  }

  // Init
  loadDashboard();
</script>
</body>
</html>
