<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login | TechMasr</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1; }
.login-card { width:100%; max-width:440px; padding:40px; }
.brand { text-align:center; margin-bottom:36px; }
.brand-name { font-family:'Hanken Grotesk',sans-serif; font-size:32px; font-weight:800; letter-spacing:-1px; }
.brand-name span { color: #b4c5ff; }
.brand-sub { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--outline); letter-spacing:0.15em; text-transform:uppercase; margin-top:6px; }
.form-group { margin-bottom:20px; }
.form-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--on-surface-variant); letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:8px; transition:color 0.2s; }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--outline); font-size:18px; pointer-events:none; transition:color 0.2s; }
.input-field { padding-left:44px; }
.input-wrap:focus-within .input-icon { color: var(--primary); }
.input-wrap:focus-within + .form-label,
.form-group:focus-within .form-label { color: var(--secondary); }
.error-box { display:none; align-items:center; gap:8px; background:rgba(147,0,10,0.2); border:1px solid rgba(255,180,171,0.2); border-radius:8px; padding:12px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--error); margin-bottom:16px; }
.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider-line { flex:1; height:1px; background:var(--glass-border); }
.divider-text { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--outline); text-transform:uppercase; letter-spacing:0.08em; }
.footer-link { text-align:center; margin-top:24px; font-size:14px; color:var(--on-surface-variant); }
.footer-link a { color:var(--primary); text-decoration:none; font-weight:600; }
.footer-link a:hover { color:var(--secondary); }
</style>
</head>
<body>
<script src="utils.js"></script>
<div class="ambient-bg">
  <div class="ambient-blob" style="width:50%;height:50%;top:-10%;left:-10%;background:rgba(37,99,235,0.08)"></div>
  <div class="ambient-blob" style="width:40%;height:40%;bottom:-10%;right:-10%;background:rgba(131,67,244,0.08)"></div>
</div>

<div class="login-wrap">
  <div class="glass-card login-card animate-fade-up">
    <div class="brand">
      <div class="brand-name">Tech<span>Masr</span></div>
      <div class="brand-sub">Precision Engineered Login</div>
    </div>

    <div class="error-box" id="error-box">
      <span class="material-symbols-outlined" style="font-size:18px">error</span>
      <span id="error-text">Invalid credentials. Access denied.</span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Identifier (Username)</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">person</span>
          <input class="input-field" type="text" id="username" placeholder="your_username" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Encryption Key (Password)</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input class="input-field" type="password" id="password" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:13px;margin-top:8px" id="submit-btn">
        <span>INITIALIZE SESSION</span>
        <span class="material-symbols-outlined" style="font-size:18px">terminal</span>
      </button>
    </form>

    <div class="footer-link">
      New to the fleet? <a href="register.html">Register Asset</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (auth.isLoggedIn()) window.location.href = 'index.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');
    const card = document.querySelector('.login-card');

    btn.disabled = true;
    btn.innerHTML = '<span>AUTHENTICATING...</span>';
    errorBox.style.display = 'none';

    const result = await api.post('/auth/login', {
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    }, false);

    if (result.ok && result.data.token) {
      btn.style.background = 'linear-gradient(135deg,#c2ed30,#86b800)';
      btn.style.color = '#000';
      btn.innerHTML = '<span>ACCESS GRANTED</span><span class="material-symbols-outlined" style="font-size:18px">check_circle</span>';

      // Decode token to get user info
      const payload = JSON.parse(atob(result.data.token.split('.')[1]));
      localStorage.setItem('token', result.data.token);
      localStorage.setItem('user', JSON.stringify({ id: payload.id, username: payload.username, role: payload.role }));

      setTimeout(() => {
        window.location.href = payload.role === 'admin' ? 'admin.html' : 'index.html';
      }, 800);
    } else {
      btn.disabled = false;
      btn.innerHTML = '<span>INITIALIZE SESSION</span><span class="material-symbols-outlined" style="font-size:18px">terminal</span>';
      errorText.textContent = result.data.message || 'Invalid credentials. Access denied.';
      errorBox.style.display = 'flex';
      card.classList.add('animate-shake');
      setTimeout(() => card.classList.remove('animate-shake'), 500);
    }
  });

  document.querySelectorAll('input').forEach(i => {
    i.addEventListener('focus', () => document.getElementById('error-box').style.display = 'none');
  });
</script>
</body>
</html>
