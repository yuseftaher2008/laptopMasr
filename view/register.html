<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register | TechMasr</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1; }
.login-card { width:100%; max-width:480px; padding:40px; }
.brand { text-align:center; margin-bottom:32px; }
.brand-name { font-family:'Hanken Grotesk',sans-serif; font-size:28px; font-weight:800; letter-spacing:-0.5px; }
.brand-name span { color: #b4c5ff; }
.brand-sub { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--outline); letter-spacing:0.15em; text-transform:uppercase; margin-top:6px; }
.form-group { margin-bottom:16px; }
.form-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--on-surface-variant); letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:7px; }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--outline); font-size:18px; pointer-events:none; transition:color 0.2s; }
.input-field { padding-left:44px; }
.input-wrap:focus-within .input-icon { color: var(--primary); }
.error-box { display:none; align-items:center; gap:8px; background:rgba(147,0,10,0.2); border:1px solid rgba(255,180,171,0.2); border-radius:8px; padding:12px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--error); margin-bottom:16px; }
.footer-link { text-align:center; margin-top:20px; font-size:14px; color:var(--on-surface-variant); }
.footer-link a { color:var(--primary); text-decoration:none; font-weight:600; }
.footer-link a:hover { color:var(--secondary); }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
</style>
</head>
<body>
<script src="utils.js"></script>
<div class="ambient-bg">
  <div class="ambient-blob" style="width:50%;height:50%;top:-10%;left:-10%;background:rgba(37,99,235,0.08)"></div>
  <div class="ambient-blob" style="width:40%;height:40%;bottom:-10%;right:-10%;background:rgba(131,67,244,0.08)"></div>
</div>

<div class="login-wrap">
  <div class="glass-card login-card animate-fade-up">
    <div class="brand">
      <div class="brand-name">Tech<span>Masr</span></div>
      <div class="brand-sub">Register New Asset</div>
    </div>

    <div class="error-box" id="error-box">
      <span class="material-symbols-outlined" style="font-size:18px">error</span>
      <span id="error-text">Something went wrong.</span>
    </div>

    <form id="register-form">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">badge</span>
            <input class="input-field" type="text" id="name" placeholder="Yusef Taher" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon">person</span>
            <input class="input-field" type="text" id="username" placeholder="yusef123" required/>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">alternate_email</span>
          <input class="input-field" type="email" id="email" placeholder="yusef@example.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input class="input-field" type="password" id="password" placeholder="Min 8 chars, A-Z, 0-9, symbols" required/>
        </div>
      </div>

      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:13px;margin-top:8px" id="submit-btn">
        <span>CREATE ACCOUNT</span>
        <span class="material-symbols-outlined" style="font-size:18px">rocket_launch</span>
      </button>
    </form>

    <div class="footer-link">
      Already have access? <a href="login.html">Login</a>
    </div>
  </div>
</div>

<script>
  if (auth.isLoggedIn()) window.location.href = 'index.html';

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');

    btn.disabled = true;
    btn.innerHTML = '<span>REGISTERING...</span>';
    errorBox.style.display = 'none';

    const result = await api.post('/auth/register', {
      name: document.getElementById('name').value,
      username: document.getElementById('username').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    }, false);

    if (result.ok) {
      btn.style.background = 'linear-gradient(135deg,#c2ed30,#86b800)';
      btn.style.color = '#000';
      btn.innerHTML = '<span>REGISTERED!</span><span class="material-symbols-outlined" style="font-size:18px">check_circle</span>';
      setTimeout(() => window.location.href = 'login.html', 800);
    } else {
      btn.disabled = false;
      btn.innerHTML = '<span>CREATE ACCOUNT</span><span class="material-symbols-outlined" style="font-size:18px">rocket_launch</span>';
      const errors = result.data.errors;
      errorText.textContent = errors ? errors[0].msg : (result.data.message || 'Registration failed.');
      errorBox.style.display = 'flex';
    }
  });
</script>
</body>
</html>
