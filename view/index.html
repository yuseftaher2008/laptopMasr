<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TechMasr — Premium Tech Store</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

/* Hero */
.hero { padding: 100px 0 80px; text-align:center; }
.hero-eyebrow { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--secondary); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:20px; }
.hero-title { font-family:'Hanken Grotesk',sans-serif; font-size:clamp(40px,7vw,72px); font-weight:800; line-height:1.05; letter-spacing:-0.03em; margin-bottom:20px; }
.hero-title .accent { background:linear-gradient(135deg,#b4c5ff,#d2bbff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero-sub { font-size:17px; color:var(--on-surface-variant); max-width:520px; margin:0 auto 36px; line-height:1.6; }
.hero-actions { display:flex; gap:14px; justify-content:center; align-items:center; }

/* Filters */
.filters { padding:32px 0; border-bottom:1px solid var(--glass-border); margin-bottom:48px; }
.filters-inner { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.filter-chip { font-family:'JetBrains Mono',monospace; font-size:11px; padding:8px 16px; border-radius:20px; border:1px solid var(--glass-border); background:transparent; color:var(--on-surface-variant); cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; text-transform:uppercase; }
.filter-chip:hover { border-color:var(--primary); color:var(--primary); }
.filter-chip.active { background:rgba(180,197,255,0.1); border-color:var(--primary); color:var(--primary); }
.filter-input { background:rgba(23,31,51,0.8); border:1px solid var(--glass-border); border-radius:8px; padding:8px 14px; color:var(--on-surface); font-size:13px; outline:none; width:140px; }
.filter-input:focus { border-color:var(--primary); }
.filter-input::placeholder { color:var(--outline); }

/* Products grid */
.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; padding-bottom:60px; }

/* Product card */
.product-card { cursor:pointer; overflow:hidden; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.product-card:hover { transform:translateY(-6px); }
.product-card:hover .product-img-wrap { opacity:0.9; }
.product-img-wrap { width:100%; height:200px; background:rgba(23,31,51,0.8); border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.product-img { width:80%; height:80%; object-fit:contain; transition:transform 0.4s ease; }
.product-card:hover .product-img { transform:scale(1.05); }
.product-placeholder { font-size:60px; opacity:0.3; }
.product-info { padding:18px; }
.product-brand { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--secondary); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
.product-name { font-family:'Hanken Grotesk',sans-serif; font-size:16px; font-weight:600; color:var(--on-surface); margin-bottom:8px; line-height:1.3; }
.product-specs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.spec-chip { font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 8px; border-radius:4px; background:rgba(180,197,255,0.08); color:var(--primary); border:1px solid rgba(180,197,255,0.15); }
.product-footer { display:flex; align-items:center; justify-content:space-between; }
.product-price { font-family:'Hanken Grotesk',sans-serif; font-size:20px; font-weight:700; color:var(--on-surface); }
.product-price span { font-size:12px; font-weight:400; color:var(--outline); font-family:'JetBrains Mono',monospace; }
.add-btn { background:rgba(37,99,235,0.15); border:1px solid rgba(37,99,235,0.3); border-radius:8px; padding:8px 14px; color:var(--primary); font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all 0.2s; font-family:'JetBrains Mono',monospace; }
.add-btn:hover { background:rgba(37,99,235,0.3); box-shadow:0 0 15px rgba(37,99,235,0.3); }
.out-of-stock { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--error); border:1px solid rgba(255,180,171,0.2); padding:6px 10px; border-radius:6px; }

/* Loading */
.loading { text-align:center; padding:80px; color:var(--outline); font-family:'JetBrains Mono',monospace; font-size:13px; }
.spinner { width:32px; height:32px; border:2px solid var(--glass-border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Empty */
.empty { text-align:center; padding:80px 20px; }
.empty-title { font-family:'Hanken Grotesk',sans-serif; font-size:22px; font-weight:700; margin-bottom:10px; }
.empty-sub { color:var(--on-surface-variant); font-size:15px; }

/* Section title */
.section-header { display:flex; align-items:baseline; gap:16px; margin-bottom:28px; }
.section-title { font-family:'Hanken Grotesk',sans-serif; font-size:24px; font-weight:700; }
.section-count { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--outline); }
</style>
</head>
<body>
<script src="utils.js"></script>

<nav class="navbar" id="navbar"></nav>

<div class="page">
  <!-- Hero -->
  <div class="container">
    <div class="hero animate-fade-up">
      <div class="hero-eyebrow">// Premium Tech Marketplace</div>
      <h1 class="hero-title">Your Next <span class="accent">Machine</span><br>Awaits</h1>
      <p class="hero-sub">Laptops, phones, tablets, and gear — precision-curated for engineers, creators, and gamers.</p>
      <div class="hero-actions">
        <button class="btn-primary" onclick="document.getElementById('products-section').scrollIntoView({behavior:'smooth'})">
          <span>Shop Now</span>
          <span class="material-symbols-outlined" style="font-size:18px">arrow_downward</span>
        </button>
        ${auth.isLoggedIn() ? '' : '<a href="register.html"><button class="btn-ghost">Join the Fleet</button></a>'}
      </div>
    </div>

    <!-- Filters -->
    <div class="filters animate-fade-up delay-2" id="products-section">
      <div class="filters-inner">
        <span class="label-tech" style="color:var(--outline);margin-right:4px">Filter:</span>
        <button class="filter-chip active" onclick="filterByBrand('')">All</button>
        <button class="filter-chip" onclick="filterByBrand('Dell')">Dell</button>
        <button class="filter-chip" onclick="filterByBrand('Apple')">Apple</button>
        <button class="filter-chip" onclick="filterByBrand('Asus')">Asus</button>
        <button class="filter-chip" onclick="filterByBrand('Lenovo')">Lenovo</button>
        <button class="filter-chip" onclick="filterByBrand('Samsung')">Samsung</button>
        <div style="margin-left:auto;display:flex;gap:8px">
          <input class="filter-input" type="number" id="min-price" placeholder="Min EGP" onchange="applyFilters()"/>
          <input class="filter-input" type="number" id="max-price" placeholder="Max EGP" onchange="applyFilters()"/>
          <input class="filter-input" type="text" id="search-tag" placeholder="Search tag..." oninput="applyFilters()" style="width:160px"/>
        </div>
      </div>
    </div>

    <!-- Products -->
    <div class="section-header">
      <div class="section-title">Products</div>
      <div class="section-count" id="product-count"></div>
    </div>
    <div class="products-grid" id="products-grid">
      <div class="loading" style="grid-column:1/-1">
        <div class="spinner"></div>
        <div>Loading products...</div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <span>© 2024 TechMasr. Precision Engineered.</span>
  <div style="display:flex;gap:24px">
    <a href="#" style="color:var(--outline);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:11px">Support</a>
    <a href="#" style="color:var(--outline);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:11px">Privacy</a>
  </div>
</footer>

<div id="toast-container" class="toast-container"></div>

<script>
  renderNavbar('home');
  renderAmbient();

  let currentBrand = '';
  let allProducts = [];

  const icons = { laptop:'laptop_mac', phone:'smartphone', tablet:'tablet', default:'devices' };

  function productIcon(name='') {
    const n = name.toLowerCase();
    if (n.includes('phone') || n.includes('iphone') || n.includes('galaxy s')) return icons.phone;
    if (n.includes('tablet') || n.includes('ipad')) return icons.tablet;
    return icons.laptop;
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    document.getElementById('product-count').textContent = `${products.length} items`;

    if (!products.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-title">No products found</div>
        <div class="empty-sub">Try adjusting your filters</div>
      </div>`;
      return;
    }

    grid.innerHTML = products.map((p, i) => `
      <div class="glass-card product-card animate-fade-up delay-${Math.min(i+1,5)}" onclick="viewProduct(${p.id})">
        <div class="product-img-wrap">
          ${p.image_url
            ? `<img class="product-img" src="${p.image_url}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
               <div class="product-placeholder" style="display:none"><span class="material-symbols-outlined" style="font-size:64px;color:var(--outline)">${productIcon(p.name)}</span></div>`
            : `<div class="product-placeholder"><span class="material-symbols-outlined" style="font-size:64px;color:var(--outline)">${productIcon(p.name)}</span></div>`
          }
        </div>
        <div class="product-info">
          <div class="product-brand">${p.brand || 'Unknown'}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-specs">
            ${p.cpu ? `<span class="spec-chip">${p.cpu}</span>` : ''}
            ${p.ram ? `<span class="spec-chip">${p.ram}GB RAM</span>` : ''}
            ${p.storage ? `<span class="spec-chip">${p.storage}GB SSD</span>` : ''}
          </div>
          <div class="product-footer">
            <div class="product-price">EGP ${Number(p.price).toLocaleString()} <span>EGP</span></div>
            ${p.stock > 0
              ? `<button class="add-btn" onclick="event.stopPropagation();addToCart(${p.id})">
                  <span class="material-symbols-outlined" style="font-size:16px">add_shopping_cart</span> Add
                 </button>`
              : `<div class="out-of-stock">Out of stock</div>`
            }
          </div>
        </div>
      </div>
    `).join('');
  }

  async function loadProducts(params = '') {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div><div>Loading...</div></div>';
    try {
      const data = await fetch(`${API}/products${params}`).then(r => r.json());
      allProducts = Array.isArray(data) ? data : [];
      renderProducts(allProducts);
    } catch {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-title">Failed to load</div><div class="empty-sub">Make sure the backend is running</div></div>';
    }
  }

  function filterByBrand(brand) {
    currentBrand = brand;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const params = new URLSearchParams();
    if (currentBrand) params.set('brand', currentBrand);
    const min = document.getElementById('min-price').value;
    const max = document.getElementById('max-price').value;
    const tag = document.getElementById('search-tag').value;
    if (min) params.set('minPrice', min);
    if (max) params.set('maxPrice', max);
    if (tag) params.set('tags', tag);
    loadProducts(params.toString() ? `?${params}` : '');
  }

  async function addToCart(productId) {
    if (!auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
    const result = await api.post('/cart', { product_id: productId, quantity: 1 });
    if (result.ok) {
      toast.show('Added to cart!');
      updateCartCount();
    } else {
      toast.show(result.data.message || 'Failed to add', 'error');
    }
  }

  function viewProduct(id) {
    window.location.href = `product.html?id=${id}`;
  }

  loadProducts();
</script>
</body>
</html>
